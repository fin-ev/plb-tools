<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plumbline — The Financial Evolution</title>
<style>
  :root {
    --bg: #f8f5ed;
    --surface: #ffffff;
    --surface-2: #fbf9f3;
    --border: #e8e3d4;
    --border-strong: #d0c9b5;
    --text: #1f1c18;
    --text-muted: #6b6557;
    --text-subtle: #9c9489;

    --brass: #a47e3b;
    --brass-soft: #f3ead6;
    --brass-deep: #8b6a2f;

    --britt: #8a5a3c;
    --britt-soft: #f3eae3;
    --you: #2c5d6e;
    --you-soft: #e4ecef;

    --track1: #2c5d6e;
    --track1-soft: #e4ecef;
    --track2: #5d3d6b;
    --track2-soft: #ece4ef;

    --done: #486f5c;
    --done-soft: #e3ebe6;
    --warn: #a47e3b;
    --warn-soft: #f3ead6;
    --danger: #8a3a2c;
    --danger-soft: #f5e2dd;

    --shadow-sm: 0 1px 2px rgba(31,28,24,0.04);
    --shadow-md: 0 4px 12px rgba(31,28,24,0.06);
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .mono {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.92em;
  }

  /* ======== TOP BAR ======== */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .brand-logo {
    flex-shrink: 0;
  }
  .brand-text { display: flex; flex-direction: column; }
  .brand-name {
    font-family: ui-serif, "Iowan Old Style", "Apple Garamond", Baskerville, "Times New Roman", serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.005em;
    color: var(--text);
    line-height: 1;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ======== TABS ======== */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3px;
  }
  .tab {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* ======== PERSON TOGGLE ======== */
  .person-toggle {
    display: flex;
    gap: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3px;
  }
  .person-btn {
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  .person-btn:hover { color: var(--text); }
  .person-btn.active.britt {
    background: var(--britt-soft);
    color: var(--britt);
    box-shadow: var(--shadow-sm);
  }
  .person-btn.active.you {
    background: var(--you-soft);
    color: var(--you);
    box-shadow: var(--shadow-sm);
  }
  .person-btn.active.both {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  .brand-date {
    font-size: 13px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    margin-left: auto;
  }

  /* ======== MAIN ======== */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ======== HERO HEADER ======== */
  .hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--brass);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }
  .hero-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    flex-wrap: wrap;
  }
  .hero h1 {
    font-family: ui-serif, "Iowan Old Style", "Apple Garamond", Baskerville, serif;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.005em;
    margin-bottom: 4px;
    color: var(--text);
  }
  .hero-meta {
    font-size: 13px;
    color: var(--text-muted);
  }
  .hero-meta strong { color: var(--text); font-weight: 600; }

  /* ======== PROGRESS RING ======== */
  .progress-summary {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-num {
    font-size: 28px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    font-family: ui-serif, serif;
  }
  .progress-num .total {
    font-size: 18px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .progress-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }
  .progress-bar {
    width: 140px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar > div {
    height: 100%;
    background: var(--brass);
    transition: width 0.3s ease;
  }

  /* ======== TODAY VIEW ======== */
  .today-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .today-grid.both {
    grid-template-columns: 1fr 1fr;
  }
  @media (max-width: 900px) {
    .today-grid.both { grid-template-columns: 1fr; }
  }

  .person-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    position: relative;
  }

  /* The plumbline — vertical brass anchor */
  .person-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 2px;
    background: linear-gradient(180deg, var(--brass) 0%, var(--brass) 92%, var(--brass-deep) 92%, var(--brass-deep) 100%);
    border-radius: 0 1px 1px 0;
  }

  .person-card-header {
    padding: 14px 24px 14px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .person-card-header.britt { background: var(--britt-soft); color: var(--britt); }
  .person-card-header.you { background: var(--you-soft); color: var(--you); }
  .person-card-header .progress-mini {
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    font-weight: 500;
    opacity: 0.85;
  }

  .section {
    padding: 18px 24px 18px 28px;
    border-bottom: 1px solid var(--border);
  }
  .section:last-child { border-bottom: none; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label .pill {
    font-size: 10px;
    background: var(--brass-soft);
    color: var(--brass-deep);
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* ======== TASK LIST ======== */
  .task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    cursor: pointer;
    user-select: none;
  }
  .task:hover .task-text { color: var(--text); }
  .task-check {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s ease;
    background: var(--surface);
  }
  .task-check svg {
    width: 12px;
    height: 12px;
    stroke: var(--surface);
    stroke-width: 3;
    fill: none;
    opacity: 0;
    transition: opacity 0.12s ease;
  }
  .task.done .task-check {
    background: var(--done);
    border-color: var(--done);
  }
  .task.done .task-check svg { opacity: 1; }
  .task-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.45;
    flex: 1;
  }
  .task.done .task-text {
    color: var(--text-subtle);
    text-decoration: line-through;
    text-decoration-color: var(--text-subtle);
  }
  .task-time {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    background: var(--surface-2);
    padding: 1px 8px;
    border-radius: 4px;
    margin-top: 1px;
  }
  .task-from-bench {
    font-size: 10px;
    background: var(--brass-soft);
    color: var(--brass-deep);
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 600;
    margin-left: 8px;
  }

  /* ======== HEADLINE TASK (#1) ======== */
  .headline-task {
    background: linear-gradient(135deg, #fef5e0 0%, #faecc7 100%);
    border: 1px solid #ecd9a8;
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .headline-task .check-big {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: 2px solid var(--brass-deep);
    border-radius: 6px;
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .headline-task.done .check-big {
    background: var(--brass-deep);
  }
  .headline-task.done .check-big svg { opacity: 1; }
  .headline-task .check-big svg {
    width: 16px;
    height: 16px;
    stroke: #fff;
    stroke-width: 3;
    fill: none;
    opacity: 0;
  }
  .headline-task .text {
    font-size: 15px;
    font-weight: 500;
    color: #5e4615;
    line-height: 1.4;
  }
  .headline-task.done .text {
    text-decoration: line-through;
    opacity: 0.7;
  }

  /* ======== EOD FIELDS ======== */
  .eod-fields {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .eod-field label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    display: block;
    margin-bottom: 4px;
  }
  .eod-field textarea, .eod-field input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 14px;
    background: var(--surface-2);
    color: var(--text);
    resize: vertical;
    min-height: 36px;
  }
  .eod-field textarea:focus, .eod-field input:focus {
    outline: none;
    border-color: var(--brass);
    background: var(--surface);
  }

  /* ======== BENCH ======== */
  .bench-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bench-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
  }
  .bench-item .bench-text { flex: 1; }
  .bench-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .bench-action {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }
  .bench-action:hover {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border-strong);
  }
  .bench-action.promote {
    background: var(--brass-soft);
    color: var(--brass-deep);
    border-color: var(--brass);
  }
  .bench-action.promote:hover {
    background: var(--brass);
    color: white;
  }
  .bench-add {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .bench-add input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface-2);
  }
  .bench-add input:focus {
    outline: none;
    border-color: var(--brass);
    background: var(--surface);
  }
  .bench-add button {
    background: var(--brass);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .bench-add button:hover { background: var(--brass-deep); }
  .bench-empty {
    font-size: 12px;
    color: var(--text-subtle);
    font-style: italic;
    padding: 8px 0;
  }

  /* ======== WEEK VIEW ======== */
  .week-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--brass);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    box-shadow: var(--shadow-sm);
  }
  .week-theme {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--brass-deep);
  }
  .week-title {
    font-family: ui-serif, "Iowan Old Style", serif;
    font-size: 22px;
    font-weight: 500;
    margin-top: 2px;
    margin-bottom: 4px;
  }
  .week-sub {
    font-size: 13px;
    color: var(--text-muted);
  }
  .week-nav {
    display: flex;
    gap: 6px;
  }
  .week-nav button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }
  .week-nav button:hover:not(:disabled) {
    background: var(--surface);
    color: var(--text);
  }
  .week-nav button.active {
    background: var(--brass);
    color: white;
    border-color: var(--brass);
  }

  /* ======== TRACKING METRICS ======== */
  .tracking-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .metric-card:hover { border-color: var(--border-strong); }
  .metric-card.done {
    background: var(--done-soft);
    border-color: var(--done);
  }
  .metric-card.done .metric-status {
    color: var(--done);
  }
  .metric-label {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .metric-status {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .metric-status::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ======== DAY GRID ======== */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  @media (max-width: 900px) { .day-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .day-grid { grid-template-columns: 1fr; } }
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    transition: all 0.12s;
  }
  .day-card.today {
    border-color: var(--brass);
    border-width: 2px;
    padding: 13px;
  }
  .day-card.past { opacity: 0.6; }
  .day-card-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .day-name {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  .day-card.today .day-name { color: var(--brass-deep); }
  .day-num {
    font-family: ui-serif, serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 6px;
  }
  .day-headline {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.3;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .day-progress {
    font-size: 11px;
    font-weight: 600;
    color: var(--brass-deep);
    font-variant-numeric: tabular-nums;
    margin-top: 6px;
  }

  /* ======== TOP-5 LIST ======== */
  .top5 {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .top5 h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .top5 h3 .who {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .top5 h3 .who.britt { background: var(--britt-soft); color: var(--britt); }
  .top5 h3 .who.you { background: var(--you-soft); color: var(--you); }
  .top5 ol {
    list-style: none;
    counter-reset: top5;
  }
  .top5 ol li {
    counter-increment: top5;
    padding: 8px 0 8px 28px;
    position: relative;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .top5 ol li:last-child { border-bottom: none; }
  .top5 ol li::before {
    content: counter(top5);
    position: absolute;
    left: 0;
    top: 9px;
    width: 20px;
    height: 20px;
    background: var(--brass-soft);
    border-radius: 50%;
    font-size: 11px;
    font-weight: 600;
    color: var(--brass-deep);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ======== MONTH VIEW ======== */
  .month-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 800px) { .month-summary { grid-template-columns: 1fr; } }
  .week-summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .week-summary-card .num {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .week-summary-card .theme {
    font-size: 14px;
    font-weight: 600;
    color: var(--brass-deep);
    margin: 4px 0;
  }
  .week-summary-card .focus {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  table.goals {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    font-size: 13px;
  }
  table.goals thead { background: var(--surface-2); }
  table.goals th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn('State load failed:', e); }
  return {
    person: 'britt',

    tasks: {},
    metrics: {},
    goals: {},
    eod: {},
    parking: {},
    review: {},
    bench: { britt: [], you: [] },
    promoted: {} // key: `${date}|${person}|alone|${idx}` → true if it came from bench
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    showSaveIndicator();
  } catch (e) { console.warn('State save failed:', e); }
}

let saveTimeout;
function showSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('visible');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => el.classList.remove('visible'), 1200);
}

/* ---------- DATE HELPERS ---------- */

function todayKey() {
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function pickDisplayDate() {
  const today = todayKey();
  if (DAYS[today]) return today;
  const allKeys = Object.keys(DAYS).sort();
  if (today < allKeys[0]) return allKeys[0];
  if (today > allKeys[allKeys.length-1]) return allKeys[allKeys.length-1];
  return allKeys[0];
}

function formatHumanDate(key) {
  const [y,m,d] = key.split('-').map(Number);
  const date = new Date(y, m-1, d);
  const weekday = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
  const month = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1];
  return `${weekday} · ${month} ${d}, ${y}`;
}

function formatBrandDate() {
  return formatHumanDate(todayKey());
}

/* ---------- TASK HELPERS ---------- */

function tk(date, person, section, idx) {
  return `${date}|${person}|${section}|${idx}`;
}
function isTaskDone(date, person, section, idx) {
  return !!state.tasks[tk(date, person, section, idx)];
}
function toggleTask(date, person, section, idx) {
  state.tasks[tk(date, person, section, idx)] = !state.tasks[tk(date, person, section, idx)];
  saveState();
}

function getAloneTasks(date, person) {
  const sheet = DAYS[date];
  if (!sheet) return [];
  const base = sheet[person].alone.slice();
  // Also include any promoted-from-bench tasks for this date+person
  const promotedKey = `${date}|${person}|alone-promoted`;
  const promoted = state.promoted[promotedKey] || [];
  return base.concat(promoted.map(text => ({ text, fromBench: true })));
}

function countDayTasks(date, person) {
  if (!DAYS[date]) return { done: 0, total: 0 };
  const sheet = DAYS[date][person];
  let total = 1;
  let done = isTaskDone(date, person, 'one', 0) ? 1 : 0;
  ['timed', 'shoulder'].forEach(sec => {
    sheet[sec].forEach((_, i) => {
      total++;
      if (isTaskDone(date, person, sec, i)) done++;
    });
  });
  const aloneTasks = getAloneTasks(date, person);
  aloneTasks.forEach((_, i) => {
    total++;
    if (isTaskDone(date, person, 'alone', i)) done++;
  });
  const standing = person === 'britt' ? STANDING_DAILIES_BRITT : STANDING_DAILIES_YOU;
  standing.forEach((_, i) => {
    total++;
    if (isTaskDone(date, person, 'standing', i)) done++;
  });
  return { done, total };
}

/* ---------- BENCH HELPERS ---------- */

function addBenchItem(person, text) {
  if (!text.trim()) return;
  state.bench[person] = state.bench[person] || [];
  state.bench[person].push(text.trim());
  saveState();
}

function removeBenchItem(person, idx) {
  state.bench[person].splice(idx, 1);
  saveState();
}

function promoteBenchItem(date, person, idx) {
  const text = state.bench[person][idx];
  state.bench[person].splice(idx, 1);
  const promotedKey = `${date}|${person}|alone-promoted`;
  state.promoted[promotedKey] = state.promoted[promotedKey] || [];
  state.promoted[promotedKey].push(text);
  saveState();
}

function taskRow(date, person, section, idx, text, time, fromBench) {

      </div>
      <div class="task-text">${escape(text)}${fromBench ? `<span class="task-from-bench">← from bench</span>` : ''}</div>
      ${time ? `<div class="task-time">${escape(time)}</div>` : ''}
    </div>
  `;
}

function attachTodayHandlers(date) {
  const persons = state.person === 'both' ? ['britt', 'you'] : [state.person];
  persons.forEach((person, pi) => {
    const cards = document.querySelectorAll('.person-card');
    const card = cards[pi];
    if (!card) return;

    card.querySelectorAll('.task').forEach(el => {
      el.addEventListener('click', () => {
        const section = el.dataset.section;
        const idx = parseInt(el.dataset.idx, 10);
        toggleTask(date, person, section, idx);
        renderToday();
      });
    });

    const headline = card.querySelector('.headline-task');
    if (headline) {
      headline.addEventListener('click', () => {
        toggleTask(date, person, 'one', 0);
        renderToday();
      });
    }

    card.querySelectorAll('[data-eodkey]').forEach(el => {
      el.addEventListener('input', () => {
        const [type, k1, k2, k3] = el.dataset.eodkey.split('|');
        const fullKey = [k1, k2, k3].filter(Boolean).join('|');
        if (type === 'eod') state.eod[fullKey] = el.value;
        else if (type === 'park') state.parking[fullKey] = el.value;
        saveState();
      });
    });

    // Bench handlers
    card.querySelectorAll('[data-bench-promote]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.benchPromote, 10);
        promoteBenchItem(date, person, idx);
        renderToday();
      });
    });
    card.querySelectorAll('[data-bench-remove]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.benchRemove, 10);
        removeBenchItem(person, idx);
        renderToday();
      });
    });
    const addBtn = card.querySelector('[data-bench-add]');
    const addInput = card.querySelector('[data-bench-input]');
    if (addBtn && addInput) {
      const addItem = () => {
        const v = addInput.value;
        if (v.trim()) {
          addBenchItem(person, v);
          addInput.value = '';
          renderToday();
        }
      };
      addBtn.addEventListener('click', addItem);
      addInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') { e.preventDefault(); addItem(); }
      });
    }
  });
}

            <label>2. What broke (10 min)</label>
            <textarea data-revkey="${wk.id}|broke" placeholder="Specific blockers, not 'time management'...">${escape(state.review[`${wk.id}|broke`] || '')}</textarea>

            <input type="text" data-revkey="${wk.id}|sunday" placeholder="Confirmed scheduled" value="${escape(state.review[`${wk.id}|sunday`] || '')}">
          </div>
        </div>
      </div>
    `;
  }

  view.innerHTML = html;
  attachWeekHandlers();
}

function attachWeekHandlers() {
  document.querySelectorAll('[data-week]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.selectedWeek = btn.dataset.week;
      saveState();
      renderWeek();
    });
  });
  document.querySelectorAll('[data-metric]').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.metric;
      state.metrics[id] = !state.metrics[id];
      saveState();
      renderWeek();
    });
  });
  document.querySelectorAll('[data-revkey]').forEach(el => {
    el.addEventListener('input', () => {
      state.review[el.dataset.revkey] = el.value;
      saveState();
    });
  });
}

/* ---------- MONTH VIEW ---------- */

        </div>
      `).join('')}
    </div>

    <table class="goals">
      <thead>
        <tr>
          <th>#</th>
          <th>Goal</th>
          <th>Owner</th>
          <th>Target</th>
          <th>Week</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${GOALS.map(g => {
          const status = state.goals[g.num] || 'not_started';
          const label = status === 'not_started' ? 'Not started' : status === 'in_progress' ? 'In progress' : 'Done';
          return `
            <tr>
              <td class="goal-num">${g.num}</td>
              <td class="goal-text">${escape(g.text)}</td>
              <td class="goal-text" style="font-weight:400;color:var(--text-muted);font-size:12px;">${escape(g.owner)}</td>
              <td style="font-variant-numeric:tabular-nums;font-weight:500;">${escape(g.target)}</td>
              <td style="color:var(--text-muted);font-size:12px;">${escape(g.week)}</td>
              <td><span class="status-pill" data-goal="${g.num}" data-status="${status}">${label}</span></td>

    <div class="not-in-may">

        <strong>GHL rebuild of Cash Surge funnel</strong> — explicitly June (Build_Queue #01).
      </div>
    </div>
  `;

  view.innerHTML = html;

  document.querySelectorAll('.status-pill[data-goal]').forEach(pill => {
    pill.addEventListener('click', () => {
      const num = parseInt(pill.dataset.goal, 10);
      const cur = state.goals[num] || 'not_started';
      const next = cur === 'not_started' ? 'in_progress' : cur === 'in_progress' ? 'done' : 'not_started';
      state.goals[num] = next;
      saveState();
      renderMonth();
    });
  });
}

/* ---------- UTILITIES ---------- */

function escape(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ---------- VIEW SWITCH ---------- */

function setView(v) {
  state.view = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  saveState();
  if (v === 'today') renderToday();
  if (v === 'week') renderWeek();
  if (v === 'month') renderMonth();
  if (v === 'reference') renderReference();
}

function setPerson(p) {
  state.person = p;
  document.querySelectorAll('.person-btn').forEach(b => b.classList.toggle('active', b.dataset.person === p));
  saveState();
  if (state.view === 'today') renderToday();
}

function renderAll() {
  document.getElementById('brandDate').textContent = formatBrandDate();
  document.querySelectorAll('.person-btn').forEach(b => b.classList.toggle('active', b.dataset.person === state.person));
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.view === state.view));
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${state.view}`).classList.add('active');
  renderToday();
  renderWeek();
  renderMonth();
  renderReference();
}

/* ---------- INIT ---------- */

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab').forEach(b => {
    b.addEventListener('click', () => setView(b.dataset.view));
  });
  document.querySelectorAll('.person-btn').forEach(b => {
    b.addEventListener('click', () => setPerson(b.dataset.person));
  });
  renderAll();
});
